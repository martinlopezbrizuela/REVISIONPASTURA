<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revision Pasturas - AGROFORCE</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --verde:#016C00;--verde2:#024e00;--verde3:#03890026;
  --navy:#1A1363;--navy2:#110d42;
  --blanco:#FFFFFF;--gris0:#F4F6F4;--gris1:#E6EBE6;
  --gris2:#B8C4B8;--gris3:#6B7A6B;--negro:#0D0D0D;
  --rojo:#B52B2B;--ambar:#B07A00;
  --r:10px;--r-lg:16px;
  --shadow:0 2px 12px rgba(0,0,0,.07);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--gris0);color:var(--negro);font-size:15px;line-height:1.6;}
.app{max-width:1200px;margin:0 auto;padding:20px 16px 60px;}

/* TOPBAR */
.topbar{background:var(--navy);color:#fff;border-radius:var(--r-lg);display:flex;align-items:stretch;margin-bottom:20px;overflow:hidden;box-shadow:var(--shadow-lg);}
.topbar-logo{background:#fff;padding:12px 18px;display:flex;align-items:center;justify-content:center;min-width:110px;border-right:3px solid var(--verde);}
.topbar-logo img{height:50px;object-fit:contain;display:block;}
.topbar-body{padding:14px 20px;flex:1;}
.topbar-body h1{font-size:18px;font-weight:700;margin-bottom:2px;}
.topbar-body .sub{font-size:11px;opacity:.7;text-transform:uppercase;letter-spacing:.5px;}
.topbar-meta{padding:14px 20px;font-size:11px;opacity:.8;text-align:right;border-left:1px solid rgba(255,255,255,.12);display:flex;flex-direction:column;justify-content:center;min-width:170px;line-height:1.8;}

/* BUTTONS */
.actions{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;align-items:center;}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:8px;padding:10px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:filter .15s;}
.btn:hover{filter:brightness(1.08);}
.btn-primary{background:var(--verde);color:#fff;}
.btn-secondary{background:var(--navy);color:#fff;}
.btn-teal{background:#1a5c8a;color:#fff;}
.btn-danger{background:var(--rojo);color:#fff;}
.btn-ghost{background:var(--gris1);color:var(--gris3);}
#syncMsg{font-size:13px;font-weight:500;}

/* CARD */
.card{background:#fff;border-radius:var(--r-lg);padding:24px;margin-bottom:16px;box-shadow:var(--shadow);border:1px solid var(--gris1);}
.card h2{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:18px;padding-bottom:8px;border-bottom:2px solid var(--verde);display:flex;align-items:center;gap:8px;}
.card h3{font-size:14px;font-weight:700;color:var(--verde2);margin:18px 0 10px;}

/* FORM */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;}
label.field{display:flex;flex-direction:column;gap:4px;font-size:12px;font-weight:600;color:var(--gris3);}
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;padding:8px 11px;border:1.5px solid var(--gris1);border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:13px;color:var(--negro);background:#fff;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--verde);}
textarea{min-height:80px;resize:vertical;}

/* CHECKS */
.checks{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px 16px;margin-top:6px;}
.checks label{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:400;cursor:pointer;}
.checks input[type=checkbox]{width:16px;height:16px;min-width:16px;accent-color:var(--verde);}

/* POTRERO CARD */
.potrero-card{background:linear-gradient(135deg,#f0f7f0,#fff);border:1.5px solid var(--verde3);border-radius:var(--r);padding:18px;margin-top:14px;position:relative;}
.potrero-num{position:absolute;top:12px;right:14px;background:var(--verde);color:#fff;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700;}
.potrero-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.potrero-header h4{font-size:15px;font-weight:700;color:var(--navy);}
.btn-rm-pot{background:#fde8e8;border:none;border-radius:6px;padding:4px 10px;font-size:12px;color:var(--rojo);cursor:pointer;font-weight:600;}
.btn-rm-pot:hover{background:#f8c8c8;}

/* FOTOS */
.fotos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px;}
.foto-slot{border:2px dashed var(--gris1);border-radius:8px;height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;position:relative;overflow:hidden;background:var(--gris0);transition:border-color .15s;}
.foto-slot:hover{border-color:var(--verde);}
.foto-slot img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.foto-slot .foto-overlay{position:absolute;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;}
.foto-slot:hover .foto-overlay{opacity:1;}
.foto-slot .foto-label{font-size:11px;color:var(--gris3);font-weight:600;position:relative;z-index:1;}
.foto-slot .foto-icon{font-size:24px;position:relative;z-index:1;}
.foto-input{display:none;}
.btn-rm-foto{background:#fde8e8;border:none;border-radius:4px;padding:3px 7px;font-size:11px;color:var(--rojo);cursor:pointer;position:absolute;top:4px;right:4px;z-index:2;font-weight:700;}

/* SITUACION BADGE */
.sit-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
.sit-1{background:#e8f4e8;color:var(--verde2);}
.sit-2{background:#fff3cd;color:#856404;}
.sit-3{background:#e8edf8;color:var(--navy);}
.sit-4{background:#fff0d4;color:var(--ambar);}
.sit-5{background:#fde8e8;color:var(--rojo);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:#fff;border-radius:var(--r-lg);padding:28px;max-width:700px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-header h2{font-size:18px;color:var(--navy);}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px;}
.tbl th{background:var(--navy);color:#fff;padding:8px 10px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;}
.tbl th:first-child{border-radius:6px 0 0 0;}
.tbl th:last-child{border-radius:0 6px 0 0;}
.tbl td{border-bottom:1px solid var(--gris1);padding:7px 9px;vertical-align:top;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:nth-child(even) td{background:#fafbfa;}

/* REPORT */
.report-section{display:none;background:#fff;border-radius:var(--r-lg);padding:32px;margin-top:20px;box-shadow:var(--shadow-lg);}

/* REPORT HEADER */
.rpt-header{background:var(--navy);color:#fff;border-radius:var(--r-lg);overflow:hidden;margin-bottom:24px;display:flex;align-items:stretch;}
.rpt-logo{background:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:center;min-width:120px;border-right:3px solid var(--verde);}
.rpt-logo img{height:70px;object-fit:contain;}
.rpt-body{padding:18px 24px;flex:1;}
.rpt-body h1{font-size:20px;font-weight:700;margin-bottom:4px;}
.rpt-sub{font-size:11px;opacity:.65;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}
.rpt-meta{display:flex;flex-wrap:wrap;gap:18px;border-top:1px solid rgba(255,255,255,.2);padding-top:8px;}
.rpt-meta-item{font-size:11px;opacity:.85;}
.rpt-meta-item strong{display:block;font-size:13px;}
.rpt-right{padding:18px 20px;border-left:1px solid rgba(255,255,255,.15);display:flex;flex-direction:column;justify-content:center;min-width:160px;text-align:right;font-size:11px;line-height:2;}

/* REPORT BLOCKS */
.rblock{background:var(--gris0);border:1px solid var(--gris1);border-radius:var(--r);padding:18px;margin-bottom:14px;}
.rblock h3{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:8px;}
.rblock.verde{border-left:4px solid var(--verde);}
.rblock.navy{border-left:4px solid var(--navy);}
.rblock.ambar{border-left:4px solid var(--ambar);}

/* POTRERO REPORT CARD */
.pot-rpt{border:1.5px solid var(--gris1);border-radius:var(--r);padding:18px;margin-bottom:16px;page-break-inside:avoid;}
.pot-rpt-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--verde);}
.pot-rpt-header h3{font-size:16px;font-weight:700;color:var(--navy);}
.pot-rpt-fotos{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;}
.pot-rpt-fotos img{width:100%;height:140px;object-fit:cover;border-radius:6px;border:1px solid var(--gris1);}
.pot-rpt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.pot-rpt-item{font-size:12px;}
.pot-rpt-item .label{color:var(--gris3);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px;}
.pot-rpt-item .value{color:var(--negro);font-weight:500;margin-top:2px;}

/* RESUMEN TABLE */
.resumen-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.resumen-tbl th{background:var(--verde);color:#fff;padding:8px 10px;text-align:left;font-size:11px;font-weight:700;}
.resumen-tbl td{border-bottom:1px solid var(--gris1);padding:7px 9px;}
.resumen-tbl tr:last-child td{background:#f0f7f0;font-weight:700;border-bottom:2px solid var(--verde);}

/* FIRMAS */
.firmas{display:flex;gap:60px;flex-wrap:wrap;margin-top:50px;}
.firma{border-top:1.5px solid var(--negro);width:260px;padding-top:8px;}
.firma strong{display:block;font-size:14px;font-weight:700;margin-bottom:4px;}
.firma span{display:block;font-size:12px;color:var(--gris3);}

/* HIST */
.hist-card{border:1.5px solid var(--gris1);border-radius:var(--r);padding:14px;margin-bottom:10px;background:var(--gris0);display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.hist-card h4{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:4px;}
.hist-meta{font-size:11px;color:var(--gris3);}
.hist-empty{text-align:center;color:var(--gris3);padding:40px 0;font-size:13px;}


/* TAG INPUT */
.tag-input-wrap{border:1.5px solid var(--gris1);border-radius:8px;background:#fff;padding:6px 8px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;cursor:text;transition:border-color .15s;min-height:42px;}
.tag-input-wrap:focus-within{border-color:var(--verde);}
.tag{display:inline-flex;align-items:center;gap:5px;background:var(--verde3);border:1px solid var(--verde);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;color:var(--verde2);}
.tag-rm{background:none;border:none;cursor:pointer;color:var(--verde2);font-size:13px;padding:0;line-height:1;font-weight:700;}
.tag-rm:hover{color:var(--rojo);}
.tag-real-input{border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:13px;min-width:160px;flex:1;background:transparent;color:var(--negro);}
.tag-hint{font-size:11px;color:var(--gris3);margin-top:4px;}

/* PRINT */
@media print{
  body *{visibility:hidden;}
  #writtenReport,#writtenReport *{visibility:visible;}
  #writtenReport{display:block!important;position:absolute;left:0;top:0;width:100%;padding:20px;background:#fff;}
  .actions,button{display:none!important;}
  .rpt-header{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .resumen-tbl th{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}

@media(max-width:800px){
  .grid2,.grid3,.grid4{grid-template-columns:1fr;}
  .fotos-grid{grid-template-columns:repeat(3,1fr);}
  .topbar{flex-direction:column;}
  .topbar-meta{border-left:none;border-top:1px solid rgba(255,255,255,.12);text-align:left;}
  .firmas{gap:30px;}
}
</style>

    <label class="field"><span>N&uacute;mero de informe</span><input type="text" id="nroInforme" placeholder="Ej: INF-001-2025"></label>

    <label class="field"><span>Encargado</span><input type="text" id="encargado"></label>

/* ── TAG INPUT ── */
function addTag(n) {
  var inp = document.getElementById("taginput-" + n);
  if (!inp) return;
  var txt = inp.value.trim();
  if (!txt) return;
  // Support comma-separated: "Algarrobo, Ipomoea"
  var parts = txt.split(",");
  for (var i = 0; i < parts.length; i++) {
    var t = parts[i].trim();
    if (!t) continue;
    insertTag(n, t);
  }
  inp.value = "";
  inp.focus();
}

function insertTag(n, text) {
  var wrap = document.getElementById("tagwrap-" + n);
  var inp  = document.getElementById("taginput-" + n);
  if (!wrap || !inp) return;
  // Check duplicate
  var existing = wrap.querySelectorAll(".tag");
  for (var i = 0; i < existing.length; i++) {
    if (existing[i].getAttribute("data-val").toLowerCase() === text.toLowerCase()) return;
  }
  var tag = document.createElement("span");
  tag.className = "tag";
  tag.setAttribute("data-val", text);
  tag.innerHTML = text + ' <button class="tag-rm" onclick="removeTag(this)" type="button">&#10005;</button>';
  wrap.insertBefore(tag, inp);
}

function removeTag(btn) {
  var tag = btn.parentNode;
  if (tag) tag.parentNode.removeChild(tag);
}

function tagKeyDown(e, n) {
  if (e.key === "Enter" || e.key === ",") {
    e.preventDefault();
    addTag(n);
  }
}


/* ── INIT ── */
window.onload = function() {
  var el = document.getElementById("mainLogo");
  if (el) el.src = LOGO;
  agregarPotrero();
  var hoy = new Date().toISOString().split("T")[0];
  var fd = document.getElementById("fecha");
  if (fd) fd.value = hoy;
  loadDB(null);
};

/* ── HELPERS ── */
function gv(id) {
  var el = document.getElementById(id);
  return el ? el.value.trim() : "";
}
function syncMsg(msg, color) {
  var el = document.getElementById("syncMsg");

function fotoSlotHTML(pot, idx) {
  return '<div class="foto-slot" id="slot-' + pot + '-' + idx + '" onclick="triggerFoto(' + pot + ',' + idx + ')">' +
    '<span class="foto-icon">&#128247;</span>' +
    '<span class="foto-label">Foto ' + idx + '</span>' +
    '<div class="foto-overlay"><span style="color:#fff;font-size:20px;">&#43;</span></div>' +
    '<input type="file" accept="image/*" class="foto-input" id="fotoinput-' + pot + '-' + idx + '" onchange="cargarFoto(' + pot + ',' + idx + ',this)">' +
    '</div>';
}

function triggerFoto(pot, idx) {
  var slot = document.getElementById("slot-" + pot + "-" + idx);
  if (!slot) return;
  var img = slot.querySelector("img");
  if (img) return; // already has photo, click does nothing (use remove button)
  var inp = document.getElementById("fotoinput-" + pot + "-" + idx);
  if (inp) inp.click();
}

function cargarFoto(pot, idx, input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  var reader = new FileReader();
  reader.onload = function(e) {
    var slot = document.getElementById("slot-" + pot + "-" + idx);
    if (!slot) return;
    // Remove old content, keep input
    var inp = document.getElementById("fotoinput-" + pot + "-" + idx);
    slot.innerHTML = "";
    var img = document.createElement("img");
    img.src = e.target.result;
    slot.appendChild(img);
    // Re-add hidden input
    inp = document.createElement("input");
    inp.type = "file";
    inp.accept = "image/*";
    inp.className = "foto-input";
    inp.id = "fotoinput-" + pot + "-" + idx;
    inp.setAttribute("onchange", "cargarFoto(" + pot + "," + idx + ",this)");
    slot.appendChild(inp);
    // Add remove button
    var rm = document.createElement("button");
    rm.className = "btn-rm-foto";
    rm.innerHTML = "&#10005;";
    rm.setAttribute("onclick", "eliminarFoto(" + pot + "," + idx + ");event.stopPropagation();");
    slot.appendChild(rm);
    // Remove click to add
    slot.onclick = null;
  };
  reader.readAsDataURL(file);
}

function eliminarFoto(pot, idx) {
  var slot = document.getElementById("slot-" + pot + "-" + idx);
  if (!slot) return;
  slot.innerHTML = fotoSlotHTML(pot, idx);
  // Restore onclick
  slot.onclick = function(){ triggerFoto(pot, idx); };
  // Re-attach input listener
  var inp = document.getElementById("fotoinput-" + pot + "-" + idx);
  if (inp) inp.onchange = function(){ cargarFoto(pot, idx, this); };
}

function eliminarPotrero(n) {
  if (!confirm("Eliminar este potrero?")) return;
  var el = document.getElementById("potrero-" + n);

/* ── DATA GETTER ── */
function getPotreros() {
  var cards = document.querySelectorAll(".potrero-card");
  var result = [];
  for (var i = 0; i < cards.length; i++) {
    var d = cards[i];
    // Get malezas from tags
    var malezas = [];
    var tagWrap = document.getElementById("tagwrap-" + (i+1));
    // Try by index
    var allWrps = document.querySelectorAll(".tag-input-wrap");
    var wrp = null;
    var cardIdx = 0;
    var allCards = document.querySelectorAll(".potrero-card");
    for (var ci = 0; ci < allCards.length; ci++) {
      if (allCards[ci] === d) { cardIdx = ci; break; }
    }
    wrp = allWrps[cardIdx];
    if (wrp) {
      var tags = wrp.querySelectorAll(".tag");
      for (var j = 0; j < tags.length; j++) {
        var tagTxt = tags[j].getAttribute("data-val");
        if (tagTxt) malezas.push(tagTxt);
      }
    }
    // Get fotos
    var fotos = [];
    var imgs = d.querySelectorAll(".foto-slot img");
    for (var k = 0; k < imgs.length; k++) {
      fotos.push(imgs[k].src);
    }
    var nombre = d.querySelector(".pot-nombre") ? d.querySelector(".pot-nombre").value.trim() : "";
    var ha     = d.querySelector(".pot-ha")      ? d.querySelector(".pot-ha").value.trim()      : "";
    if (!nombre && !ha) continue;
    result.push({
      nombre:     nombre,
      ha:         ha,
      pastura:    d.querySelector(".pot-pastura")        ? d.querySelector(".pot-pastura").value.trim()        : "",
      carga:      d.querySelector(".pot-carga")          ? d.querySelector(".pot-carga").value.trim()          : "",
      malezas:    malezas,
      otrasMal:   "",
      situacion:  d.querySelector(".pot-situacion")      ? d.querySelector(".pot-situacion").value              : "",
      producto:   d.querySelector(".pot-producto")       ? d.querySelector(".pot-producto").value               : "",
      dosis:      d.querySelector(".pot-dosis")          ? d.querySelector(".pot-dosis").value.trim()           : "",
      obs:        d.querySelector(".pot-obs")            ? d.querySelector(".pot-obs").value.trim()             : "",
      fotos:      fotos
    });
  }
  return result;
}

function xhrGET(url, hdrs, cb) {
  var xhr = new XMLHttpRequest();
  xhr.open("GET", url, true);
  for (var k in hdrs) xhr.setRequestHeader(k, hdrs[k]);
  xhr.onload = function() {
    if (xhr.status >= 200 && xhr.status < 300) {
      try { cb(null, JSON.parse(xhr.responseText)); } catch(e) { cb(e, null); }
    } else { cb(new Error("HTTP " + xhr.status), null); }
  };
  xhr.onerror = function() { cb(new Error("Network error"), null); };
  xhr.send();
}

function xhrPUT(url, hdrs, body, cb) {
  var xhr = new XMLHttpRequest();
  xhr.open("PUT", url, true);
  for (var k in hdrs) xhr.setRequestHeader(k, hdrs[k]);
  xhr.onload = function() {
    if (xhr.status >= 200 && xhr.status < 300) {
      try { cb(null, JSON.parse(xhr.responseText)); } catch(e) { cb(e, null); }
    } else { cb(new Error("HTTP " + xhr.status), null); }
  };
  xhr.onerror = function() { cb(new Error("Network error"), null); };
  xhr.send(JSON.stringify(body));
}

    var all = (!err && data && data.record) ? data.record : {};
    all.revision_pasturas = infDB;
    xhrPUT(BIN_URL, {"Content-Type":"application/json","X-Master-Key":BIN_KEY}, all, function(err2) {
      if (cb) cb(err2);
    });
  });
}

function guardarNube() {
  var est = gv("estancia");
  if (!est) { alert("Complet\u00e1 al menos el nombre de la estancia."); return; }
  syncMsg("Guardando...", "#888");
  loadDB(function() {
    var potreros = getPotreros();
    // Don't save photos in cloud (too large), save metadata only
    var potMeta = [];
    for (var i = 0; i < potreros.length; i++) {
      potMeta.push({
        nombre:    potreros[i].nombre,
        ha:        potreros[i].ha,
        pastura:   potreros[i].pastura,
        carga:     potreros[i].carga,
        malezas:   potreros[i].malezas,
        otrasMal:  potreros[i].otrasMal,
        situacion: potreros[i].situacion,
        producto:  potreros[i].producto,
        dosis:     potreros[i].dosis,
        obs:       potreros[i].obs,
        nFotos:    potreros[i].fotos.length
      });
    }
    var snap = {
      id:           Date.now(),
      nro:          gv("nroInforme"),
      estancia:     est,
      fecha:        gv("fecha"),
      propietario:  gv("propietario"),
      ubicacion:    gv("ubicacion"),
      haTotal:      gv("haTotal"),
      cargaAnimal:  gv("cargaAnimal"),
      potreros:     potMeta,
      guardado:     new Date().toLocaleString("es-PY")
    };
    infDB.push(snap);
    saveToDB(function(err) {
      if (err) syncMsg("Error al guardar", "#B52B2B");
      else {
        syncMsg("Guardado en nube", "#016C00");
        setTimeout(function(){ syncMsg("",""); }, 3000);
      }
    });
  });
}

function verHistorial() {
  syncMsg("Cargando...", "#888");
  loadDB(function() {
    syncMsg("", "");
    var lista = document.getElementById("historialLista");
    if (!infDB.length) {
      lista.innerHTML = '<div class="hist-empty">No hay informes guardados a&uacute;n.</div>';
    } else {
      var html_h = "";
      var sorted = infDB.slice().reverse();
      for (var i = 0; i < sorted.length; i++) {
        var r = sorted[i];
        var totalHa = 0;
        var prods = [];
        if (r.potreros) {
          for (var j = 0; j < r.potreros.length; j++) {
            totalHa += parseFloat(r.potreros[j].ha) || 0;
            if (r.potreros[j].producto && prods.indexOf(r.potreros[j].producto) < 0) prods.push(r.potreros[j].producto);
          }
        }
        html_h += '<div class="hist-card">';
        html_h += '<div><h4>' + (r.nro ? "["+r.nro+"] " : "") + r.estancia + '</h4>';
        html_h += '<div class="hist-meta">&#128197; ' + r.fecha + ' &middot; ' + (r.ubicacion||"---") + ' &middot; ' + (r.potreros ? r.potreros.length : 0) + ' potreros &middot; ' + totalHa.toFixed(1) + ' ha</div>';
        if (prods.length) html_h += '<div class="hist-meta" style="margin-top:3px;">Productos: <strong>' + prods.join(", ") + '</strong></div>';
        html_h += '<div class="hist-meta" style="margin-top:3px;">Guardado: ' + r.guardado + '</div></div>';
        html_h += '<button class="btn btn-danger" onclick="eliminarInforme(' + r.id + ')">&#10005;</button>';
        html_h += '</div>';
      }
      lista.innerHTML = html_h;
    }
    document.getElementById("historialModal").style.display = "flex";
  });
}

function eliminarInforme(id) {
  if (!confirm("Eliminar este informe?")) return;
  var nuevo = [];
  for (var i = 0; i < infDB.length; i++) if (infDB[i].id !== id) nuevo.push(infDB[i]);
  infDB = nuevo;
  saveToDB(function() { verHistorial(); });
}

function cerrarHistorial() {
  document.getElementById("historialModal").style.display = "none";
}
</script>
</body>
</html>
